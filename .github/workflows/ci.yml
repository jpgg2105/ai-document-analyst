name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: |
          pip install ruff mypy pydantic pydantic-settings structlog
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/
      - name: Type check
        run: mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      qdrant:
        image: qdrant/qdrant:v1.13.2
        ports:
          - 6333:6333
    env:
      QDRANT_HOST: localhost
      QDRANT_PORT: 6333
      OPENAI_API_KEY: sk-test-fake-key-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/collections > /dev/null 2>&1; then
              echo "Qdrant is ready"
              exit 0
            fi
            echo "Waiting for Qdrant... ($i/30)"
            sleep 2
          done
          echo "Qdrant failed to start"
          exit 1
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ai-document-analyst:test .
      - name: Verify image
        run: |
          docker run --rm \
            -e OPENAI_API_KEY=sk-test-fake \
            ai-document-analyst:test \
            python -c "from src.config import settings; print('OK')"